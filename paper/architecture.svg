<svg width="680" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Web-CLI architecture</title>
  <desc>Structural diagram showing the Web-CLI architecture. Inside the browser boundary: a GUI layer and a Web Worker containing the WASM binary and virtual filesystem. A crossed-out network arrow shows zero egress is technically impossible.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #444; }
      .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Browser boundary -->
  <rect x="40" y="30" width="560" height="380" rx="20"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text class="th" x="66" y="58" fill="#042C53">Browser</text>
  <text class="ts" x="66" y="74" fill="#185FA5">sandboxed execution environment</text>

  <!-- GUI Layer -->
  <rect x="68" y="96" width="180" height="280" rx="12"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="th" x="158" y="122" text-anchor="middle" fill="#26215C">GUI layer</text>
  <text class="ts" x="158" y="140" text-anchor="middle" fill="#534AB7">web-native interface</text>

  <rect x="84" y="158" width="148" height="36" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="ts" x="158" y="180" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Preset operations</text>

  <rect x="84" y="204" width="148" height="36" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="ts" x="158" y="222" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Example library</text>

  <rect x="84" y="250" width="148" height="36" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="ts" x="158" y="268" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Raw CLI input</text>

  <rect x="84" y="296" width="148" height="36" rx="6" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text class="ts" x="158" y="314" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Live preview</text>

  <!-- GUI to Worker arrow -->
  <line x1="248" y1="236" x2="304" y2="236" class="arr" marker-end="url(#arrow)" stroke="#555"/>
  <text class="ts" x="276" y="228" text-anchor="middle">args</text>

  <!-- Worker to GUI arrow -->
  <line x1="304" y1="258" x2="248" y2="258" class="arr" marker-end="url(#arrow)" stroke="#555"/>
  <text class="ts" x="276" y="276" text-anchor="middle">output</text>

  <!-- Web Worker container -->
  <rect x="304" y="96" width="268" height="280" rx="12"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="th" x="438" y="122" text-anchor="middle" fill="#04342C">Web Worker</text>
  <text class="ts" x="438" y="140" text-anchor="middle" fill="#0F6E56">background thread</text>

  <!-- WASM Binary -->
  <rect x="324" y="156" width="228" height="88" rx="8"
        fill="#C0DD97" stroke="#3B6D11" stroke-width="0.6"/>
  <text class="th" x="438" y="185" text-anchor="middle" fill="#173404">ffmpeg.wasm</text>
  <text class="ts" x="438" y="203" text-anchor="middle" fill="#3B6D11">WebAssembly binary (31 MB)</text>
  <text class="ts" x="438" y="221" text-anchor="middle" fill="#3B6D11">CPU-bound, no syscalls</text>

  <!-- Virtual Filesystem -->
  <rect x="324" y="260" width="228" height="88" rx="8"
        fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.6"/>
  <text class="th" x="438" y="289" text-anchor="middle" fill="#2C2C2A">Virtual filesystem</text>
  <text class="ts" x="438" y="307" text-anchor="middle" fill="#5F5E5A">in-memory only (Emscripten FS)</text>
  <text class="ts" x="438" y="325" text-anchor="middle" fill="#5F5E5A">input + output files</text>

  <!-- WASM to VFS arrow -->
  <line x1="438" y1="244" x2="438" y2="258" class="arr" marker-end="url(#arrow)" stroke="#555"/>

  <!-- Input from user device -->
  <line x1="10" y1="236" x2="66" y2="236" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>
  <text class="ts" x="37" y="225" text-anchor="middle" fill="#185FA5">local file</text>

  <!-- Output / download -->
  <line x1="66" y1="310" x2="10" y2="310" class="arr" marker-end="url(#arrow)" stroke="#185FA5"/>
  <text class="ts" x="37" y="299" text-anchor="middle" fill="#185FA5">download</text>

  <!-- Crossed-out network -->
  <line x1="602" y1="236" x2="648" y2="236"
        stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <text class="ts" x="656" y="240" fill="#aaa">network</text>
  <line x1="595" y1="222" x2="665" y2="248" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="665" y1="222" x2="595" y2="248" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Zero egress callout -->
  <rect x="554" y="258" width="114" height="44" rx="6"
        fill="none" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text class="ts" x="611" y="277" text-anchor="middle" fill="#E24B4A">zero egress</text>
  <text class="ts" x="611" y="293" text-anchor="middle" fill="#E24B4A">by construction</text>

  <!-- Divider -->
  <line x1="68" y1="428" x2="600" y2="428" stroke="#ccc" stroke-width="0.5"/>

  <!-- Legend -->
  <circle cx="86"  cy="450" r="5" fill="#1D9E75"/>
  <text class="ts" x="96"  y="454">WASM binary</text>
  <circle cx="200" cy="450" r="5" fill="#534AB7"/>
  <text class="ts" x="210" y="454">GUI</text>
  <circle cx="258" cy="450" r="5" fill="#185FA5"/>
  <text class="ts" x="268" y="454">browser boundary</text>
  <circle cx="410" cy="450" r="5" fill="#E24B4A"/>
  <text class="ts" x="420" y="454">no network access possible</text>
</svg>
